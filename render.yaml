services:
  - type: web
    name: sureradar
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # Segredos: preencha no painel do Render (Environment). NÃO commitar valores.
      - key: ODDS_API_KEY
        sync: false
      - key: SUREBET_API_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
