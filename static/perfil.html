<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu perfil — SureRadar</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <!-- Google tag (gtag.js) - Google Ads -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17915571478"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-17915571478');
  </script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
  <style>
    :root{
      --bg:#05070d; --card:#0e1421; --card2:#121a2b; --line:#1b2740; --line2:#27395c;
      --text:#f2f6fc; --dim:#a3b1c9; --mute:#5e6b85;
      --green:#2ee6a8; --cyan:#38d4f5; --gold:#ffc94d;
      --grad:linear-gradient(112deg,#2ee6a8 10%,#38d4f5 90%);
      --font-d:"Sora","Inter",sans-serif; --font-b:"Inter",system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
    a{color:inherit;text-decoration:none}
    .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .wrap{max-width:920px;margin:0 auto;padding:0 24px}

    nav{border-bottom:1px solid var(--line);background:rgba(5,7,13,.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
    .navin{display:flex;align-items:center;justify-content:space-between;height:64px}
    .brand{display:flex;align-items:center;gap:11px;font-family:var(--font-d);font-weight:800;font-size:20px}
    .brand svg{width:31px;height:31px}
    .navlinks{display:flex;gap:10px}
    .nlk{font-size:14px;font-weight:600;color:var(--dim);padding:9px 15px;border-radius:10px}
    .nlk:hover{color:var(--text);background:var(--card)}
    .nlk.out{color:var(--mute)} .nlk.out:hover{color:#ff6b6b}

    h1{font-family:var(--font-d);font-size:30px;font-weight:800;letter-spacing:-.02em;margin:38px 0 6px}
    .h-sub{color:var(--dim);font-size:15px;margin-bottom:32px}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px}
    .card.full{grid-column:1/-1}
    .ct{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-bottom:18px}

    .who{display:flex;align-items:center;gap:16px}
    .av{width:58px;height:58px;border-radius:50%;background:var(--grad);color:#052015;font-family:var(--font-d);font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center}
    .who .nm{font-family:var(--font-d);font-size:20px;font-weight:700}
    .who .em{color:var(--dim);font-size:14px;margin-top:2px}

    .plan-row{display:flex;align-items:center;justify-content:space-between}
    .plan-badge{font-family:var(--font-d);font-size:22px;font-weight:800}
    .plan-badge.free{color:var(--cyan)} .plan-badge.pro{color:var(--gold)}
    .chip{font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 11px;border-radius:99px}
    .chip.free{background:rgba(56,212,245,.14);color:var(--cyan)}
    .chip.pro{background:rgba(255,201,77,.14);color:var(--gold)}
    .days{margin-top:20px}
    .days .big{font-family:var(--font-d);font-size:38px;font-weight:800;letter-spacing:-.02em}
    .days .lb{font-size:13px;color:var(--dim);margin-top:2px}
    .bar{height:8px;border-radius:99px;background:var(--card2);margin-top:14px;overflow:hidden}
    .bar i{display:block;height:100%;background:var(--grad);border-radius:99px}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:14.5px;padding:13px 22px;border-radius:12px;cursor:pointer;border:none;font-family:var(--font-b);transition:.15s}
    .btn-primary{background:var(--grad);color:#052015;box-shadow:0 10px 26px rgba(46,230,168,.26);width:100%}
    .btn-primary:hover{filter:brightness(1.06);transform:translateY(-1px)}
    .btn-ghost{background:transparent;border:1px solid var(--line2);color:var(--text)}
    .btn-ghost:hover{border-color:var(--cyan)}

    .up-benes{list-style:none;margin:16px 0 20px;display:flex;flex-direction:column;gap:9px}
    .up-benes li{font-size:13.5px;color:var(--dim);display:flex;gap:9px}
    .up-benes .ck{color:var(--green);font-weight:900}

    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:12px 10px;font-size:13.5px;border-bottom:1px solid var(--line)}
    th{color:var(--mute);font-weight:700;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase}
    td .v{font-family:var(--font-d);font-weight:700}
    .empty{text-align:center;color:var(--mute);font-size:14px;padding:30px 0}

    @media(max-width:760px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav><div class="wrap navin">
  <a class="brand" href="/app">
    <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#2EE6A8"/><stop offset="1" stop-color="#38D4F5"/></linearGradient></defs><circle cx="16" cy="16" r="13" stroke="url(#g)" stroke-width="2.4" opacity=".35"/><circle cx="16" cy="16" r="7.5" stroke="url(#g)" stroke-width="2.4" opacity=".7"/><circle cx="16" cy="16" r="2.5" fill="url(#g)"/><path d="M16 16 L27 8" stroke="url(#g)" stroke-width="2.4" stroke-linecap="round"/></svg>
    Sure<span class="grad">Radar</span>
  </a>
  <div class="navlinks">
    <a href="/app" class="nlk">← Painel</a>
    <a href="#" id="sair" class="nlk out">Sair</a>
  </div>
</div></nav>

<div class="wrap">
  <h1>Meu perfil</h1>
  <div class="h-sub">Gerencie sua conta, seu plano e seus pagamentos.</div>

  <div class="grid">
    <!-- Conta -->
    <div class="card">
      <div class="ct">Conta</div>
      <div class="who">
        <div class="av" id="av">?</div>
        <div><div class="nm" id="nm">—</div><div class="em" id="em">—</div></div>
      </div>
      <div style="margin-top:22px;font-size:13px;color:var(--mute)" id="membro"></div>
      <div id="whats-box" style="margin-top:20px">
        <div style="font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--mute);margin-bottom:8px">WhatsApp</div>
        <div style="display:flex;gap:8px">
          <input id="wa-input" type="tel" inputmode="numeric" maxlength="16" placeholder="(11) 99999-9999"
                 style="flex:1;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14.5px;font-family:var(--font-b);outline:none" />
          <button id="wa-save" class="btn btn-ghost" style="padding:11px 18px;font-size:14px">Salvar</button>
        </div>
        <div id="wa-msg" style="font-size:12.5px;margin-top:7px;min-height:16px"></div>
      </div>
    </div>

    <!-- Plano -->
    <div class="card">
      <div class="ct">Plano</div>
      <div class="plan-row">
        <span class="plan-badge" id="plan-badge">—</span>
        <span class="chip" id="plan-chip">—</span>
      </div>
      <div class="days" id="days-box"></div>
    </div>

    <!-- Add-on: Odds Erradas das Casas (comprado à parte do plano) -->
    <div class="card full" id="addon-card"></div>

    <!-- Assinatura / upgrade -->
    <div class="card full" id="sub-card"></div>

    <!-- Pagamentos -->
    <div class="card full">
      <div class="ct">Histórico de pagamentos</div>
      <div id="pgs"></div>
    </div>

    <!-- Suporte / Tickets -->
    <div class="card full">
      <div class="ct">Suporte</div>
      <p style="color:var(--dim);font-size:13.5px;margin-bottom:14px">Precisa de ajuda? Abra um ticket — respondemos por aqui e no seu e-mail. <b style="color:var(--dim)">Você pode enviar 1 ticket por dia.</b></p>
      <textarea id="tk-msg" rows="3" maxlength="2000" placeholder="Escreva sua dúvida ou problema..."
        style="width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:11px;padding:13px 14px;color:var(--text);font-size:14.5px;font-family:var(--font-b);resize:vertical"></textarea>
      <button id="tk-send" class="btn btn-primary" style="margin-top:10px;width:auto;padding:12px 22px">Enviar ticket</button>
      <div id="tk-out" style="font-size:13px;margin-top:8px;min-height:16px"></div>
      <div id="tk-lista" style="margin-top:22px"></div>
    </div>
  </div>
  <div style="height:50px"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const brl = v => "R$ " + Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2});
const data_br = ts => new Date(ts*1000).toLocaleDateString("pt-BR");

async function load(){
  let d;
  try { const r = await fetch("/api/perfil"); if(r.status===401){location.href="/login";return;} d = await r.json(); }
  catch { return; }

  $("#av").textContent = (d.nome||"?").trim()[0].toUpperCase();
  $("#nm").textContent = d.nome;
  $("#em").textContent = d.email;

  // conversão de COMPRA (Google Ads) — dispara uma vez ao voltar do pagamento (?pago=1)
  try {
    const _p = new URLSearchParams(location.search);
    if (_p.get("pago") === "1" && window.gtag) {
      const _val = (d.dias != null && d.dias > 60) ? 497.0 : 147.0; // anual vs mensal
      gtag('event', 'conversion', {
        'send_to': 'AW-17915571478/_s7-CK2V6sscEJba595C',
        'value': _val, 'currency': 'BRL',
        'transaction_id': 'pro-' + (d.email || '') + '-' + (d.expira || '')
      });
      history.replaceState(null, '', '/perfil'); // evita contar de novo se recarregar
    }
  } catch (e) {}

  // WhatsApp editável (prefill do cadastro; contas Google preenchem aqui)
  const waIn = $("#wa-input"), waMsg = $("#wa-msg");
  const fmtWa = digs => { let v=(digs||"").replace(/\D/g,"").slice(0,11);
    if(v.length>10) v=v.replace(/(\d{2})(\d{5})(\d{0,4})/,"($1) $2-$3");
    else if(v.length>6) v=v.replace(/(\d{2})(\d{4})(\d{0,4})/,"($1) $2-$3");
    else if(v.length>2) v=v.replace(/(\d{2})(\d{0,5})/,"($1) $2");
    else if(v.length>0) v=v.replace(/(\d{0,2})/,"($1");
    return v; };
  waIn.value = fmtWa(d.whatsapp || "");
  waIn.addEventListener("input", ()=>{ waIn.value = fmtWa(waIn.value); });
  $("#wa-save").onclick = async ()=>{
    const digs = waIn.value.replace(/\D/g,"");
    if(digs.length!==10 && digs.length!==11){ waMsg.style.color="#ff6b6b"; waMsg.textContent="WhatsApp inválido — com DDD."; return; }
    waMsg.style.color="var(--dim)"; waMsg.textContent="Salvando...";
    try{
      const r = await fetch("/api/perfil/whatsapp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({whatsapp:digs})});
      const j = await r.json().catch(()=>({}));
      if(r.ok){ waMsg.style.color="var(--green)"; waMsg.textContent="✓ Salvo! Já vai preenchido no Pix."; }
      else { waMsg.style.color="#ff6b6b"; waMsg.textContent=j.erro||"Não deu pra salvar."; }
    }catch{ waMsg.style.color="#ff6b6b"; waMsg.textContent="Erro de conexão."; }
  };

  const pro = d.plano === "pro";
  const badge = $("#plan-badge"), chip = $("#plan-chip");
  badge.textContent = pro ? "Pro" : "Grátis";
  badge.className = "plan-badge " + (pro?"pro":"free");
  chip.textContent = pro ? "ATIVO" : "LIMITADO A 1%";
  chip.className = "chip " + (pro?"pro":"free");

  // dias
  const db = $("#days-box");
  if (pro && d.dias != null){
    const pct = Math.min(100, Math.round(d.dias / (d.dias>60?365:30) * 100));
    const aviso = d.aviso_renovar
      ? `<div style="margin-top:12px;background:rgba(255,201,77,.12);border:1px solid rgba(255,201,77,.4);border-radius:11px;padding:12px 14px;font-size:13.5px;color:#ffdb8a">
           ⏳ <b>Seu plano vence em ${d.dias} dia(s).</b> Renove para não perder o acesso às entradas de maior lucro.
           <button onclick="location.href='/planos'" style="margin-top:9px;display:block;width:100%;background:linear-gradient(112deg,#2ee6a8,#38d4f5);color:#052015;border:none;border-radius:9px;padding:10px;font-weight:800;cursor:pointer">Renovar agora</button>
         </div>`
      : "";
    db.innerHTML = `<div class="big">${d.dias} <span style="font-size:16px;color:var(--dim)">dias</span></div>
      <div class="lb">restantes no seu plano · expira em ${data_br(d.expira)}</div>
      <div class="bar"><i style="width:${pct}%"></i></div>${aviso}`;
  } else {
    db.innerHTML = `<div class="lb" style="margin-top:6px">Você está no plano grátis — vê só entradas de até 1% de lucro.</div>`;
  }

  // add-on das Odds Erradas: quem tem vê os dias, quem não tem vê a oferta
  const ac = $("#addon-card");
  if (ac){
    const preco = brl(d.valor_preco || 47).replace(",00","");
    ac.innerHTML = d.valor_dias
      ? `<div class="ct">💎 Odds Erradas das Casas</div>
         <p style="color:var(--dim);font-size:14px;margin-bottom:14px">Add-on <b style="color:#c9a2ff">ativo</b> — faltam <b style="color:var(--text)">${d.valor_dias} dia(s)</b> de acesso à aba. Renovar antes de vencer <b>soma</b> os dias.</p>
         <button class="btn btn-ghost" onclick="location.href='/planos?addon=1'" style="width:100%">Renovar por ${preco} · +${d.valor_dias_addon||30} dias</button>`
      : `<div class="ct">💎 Odds Erradas das Casas — ${preco}</div>
         <p style="color:var(--dim);font-size:14px;margin-bottom:14px">A casa <b style="color:var(--text)">errou o preço</b> e paga acima do justo: 1 aposta, 1 casa. Compra <b style="color:var(--text)">à parte do plano</b> e libera a aba por ${d.valor_dias_addon||30} dias.</p>
         <button class="btn btn-primary" onclick="location.href='/planos?addon=1'" style="width:100%">Liberar as Odds Erradas — ${preco}</button>`;
  }

  // card de assinatura
  const sc = $("#sub-card");
  if (pro){
    const assin = d.tem_assinatura
      ? `<p style="color:var(--dim);font-size:13.5px;margin-bottom:16px">💳 Assinatura no cartão <b>ativa</b> — renova automático${d.expira?` em ${data_br(d.expira)}`:""}. Cancele quando quiser.</p>
         <button class="btn btn-ghost" id="btn-gerenciar" style="width:100%;margin-bottom:10px">Gerenciar / cancelar assinatura</button>`
      : "";
    // upgrade: mostra os planos MAIORES que o atual (os dias sempre SOMAM). Detecta o
    // plano atual pelo pagamento mais recente; se não achar, assume mensal (mostra todos).
    const ORDER = {mensal:1, trimestral:2, semestral:3, anual:4};
    const UP = {
      trimestral: {nome:"Trimestral", preco:"R$ 237", extra:"3 meses"},
      semestral:  {nome:"Semestral",  preco:"R$ 387", extra:"6 meses · 56% OFF"},
      anual:      {nome:"Anual",       preco:"R$ 497", extra:"1 ano · só R$ 41/mês"},
    };
    const _ts = v => (v==null?0:(typeof v==="number"?v:(Date.parse(v)||0)));
    let atual = "mensal";
    (d.pagamentos||[]).slice().sort((a,b)=>_ts(b.criado)-_ts(a.criado)).some(pg=>{
      if (ORDER[pg.plano]) { atual = pg.plano; return true; } return false;
    });
    const opts = ["trimestral","semestral","anual"].filter(k => ORDER[k] > (ORDER[atual]||1));
    const upgrade = opts.length ? `
      <div style="margin-top:18px;background:linear-gradient(135deg,rgba(46,230,168,.10),rgba(56,212,245,.08));border:1px solid rgba(46,230,168,.4);border-radius:14px;padding:16px 18px">
        <div style="font-weight:800;font-size:15px">🚀 Fazer upgrade do seu plano</div>
        <p style="color:#ffdb8a;font-size:13px;margin:8px 0 14px">✨ Seus <b>${d.dias} dias</b> atuais são <b>somados</b> ao novo plano — você não perde nada.</p>
        ${opts.map(k=>`<button class="btn btn-${k==='anual'?'primary':'ghost'} up-plan" data-plano="${k}" style="width:100%;margin-bottom:9px">${UP[k].nome} — ${UP[k].preco} <span style="opacity:.7;font-weight:600">· ${UP[k].extra}</span></button>`).join("")}
        <p style="font-size:11.5px;color:var(--mute);margin-top:4px;text-align:center">💳 parcele no cartão · ⚡ ou Pix</p>
      </div>` : "";
    sc.innerHTML = `<div class="ct">Assinatura</div>
      <p style="color:var(--dim);font-size:14px;margin-bottom:16px">Seu Pro está ativo. Você tem acesso a todas as entradas, de 1% a 15%+.</p>
      ${assin}
      <button class="btn btn-ghost" onclick="location.href='/app'">Ir para o painel →</button>
      ${upgrade}`;
    sc.querySelectorAll(".up-plan").forEach(b=>{
      b.onclick = ()=>location.href="/planos?upgrade=1&plano="+b.dataset.plano;
    });
    const bg = $("#btn-gerenciar");
    if (bg) bg.onclick = async ()=>{
      bg.textContent = "⏳ Abrindo..."; bg.disabled = true;
      try {
        const r = await fetch("/api/assinatura/portal",{method:"POST"});
        const j = await r.json().catch(()=>({}));
        if (r.ok && j.url) { location.href = j.url; return; }
        alert(j.erro || "Não foi possível abrir o portal agora.");
      } catch { alert("Erro de conexão."); }
      bg.textContent = "Gerenciar / cancelar assinatura"; bg.disabled = false;
    };
  } else {
    sc.innerHTML = `<div class="ct">Vire Pro e destrave as entradas de maior lucro</div>
      <ul class="up-benes">
        <li><span class="ck">✓</span> Todas as entradas — de 1% a 15%+</li>
        <li><span class="ck">✓</span> Sem limite de entradas por dia</li>
        <li><span class="ck">✓</span> Alertas prioritários no Telegram</li>
      </ul>
      <button class="btn btn-primary" id="up-anual">Assinar Pro Anual — R$ 497/ano (economize 72%)</button>
      <div style="height:10px"></div>
      <button class="btn btn-ghost" id="up-mensal" style="width:100%">Assinar Pro Mensal — R$ 147/mês</button>
      <p style="font-size:12px;color:var(--mute);margin-top:12px;text-align:center">🔒 Pagamento seguro · Garantia de 7 dias</p>`;
    // Vão pra tela de planos (com Cartão/Pix). Já rola pro plano escolhido.
    $("#up-anual").onclick = ()=>location.href="/planos#anual";
    $("#up-mensal").onclick = ()=>location.href="/planos#mensal";
  }

  // pagamentos
  const pgs = $("#pgs");
  if (!d.pagamentos || !d.pagamentos.length){
    pgs.innerHTML = `<div class="empty">Nenhum pagamento ainda.</div>`;
  } else {
    pgs.innerHTML = `<table><thead><tr><th>Data</th><th>Plano</th><th>Método</th><th style="text-align:right">Valor</th></tr></thead><tbody>${
      d.pagamentos.map(p=>`<tr><td>${data_br(p.criado)}</td><td>${p.plano}</td><td>${p.metodo||"—"}</td><td style="text-align:right"><span class="v">${brl(p.valor)}</span></td></tr>`).join("")
    }</tbody></table>`;
  }
}


// ---------- Tickets de suporte (conversa) ----------
function esc(s){ return (s||"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function bolha(m){
  const admin = m.autor === "admin";
  return `<div style="margin-top:8px;display:flex;justify-content:${admin?'flex-start':'flex-end'}">
    <div style="max-width:85%;border-radius:12px;padding:10px 13px;font-size:14px;white-space:pre-wrap;
      background:${admin?'rgba(46,230,168,.1)':'var(--card2)'};border:1px solid ${admin?'rgba(46,230,168,.3)':'var(--line2)'};
      color:${admin?'var(--text)':'var(--dim)'}">
      <div style="font-size:10.5px;font-weight:800;letter-spacing:.05em;margin-bottom:3px;color:${admin?'var(--green)':'var(--mute)'}">${admin?'SUPORTE':'VOCÊ'}</div>
      ${esc(m.texto)}</div></div>`;
}
async function loadTickets(){
  let d; try { d = await (await fetch("/api/tickets")).json(); } catch { return; }
  const box = $("#tk-lista");
  const ts = d.tickets || [];
  if (!ts.length){ box.innerHTML = ""; return; }
  box.innerHTML = `<div style="font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--mute);margin-bottom:10px">Seus tickets</div>` +
    ts.map(t=>{
      const thread = (t.msgs||[]).map(bolha).join("");
      let rodape;
      if (t.status === "respondido"){
        rodape = `<div style="margin-top:12px;display:flex;gap:8px">
          <input class="tk-reply" data-t="${t.id}" placeholder="Responder..." maxlength="2000"
            style="flex:1;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;font-family:var(--font-b)" />
          <button class="btn btn-ghost tk-reply-send" data-t="${t.id}" style="width:auto;padding:11px 16px">Enviar</button></div>`;
      } else if (t.status === "resolvido"){
        rodape = `<div style="margin-top:10px;font-size:12.5px;color:var(--green)">✓ Resolvido</div>`;
      } else {
        rodape = `<div style="margin-top:10px;font-size:12.5px;color:var(--gold)">⏳ Aguardando resposta do suporte</div>`;
      }
      return `<div style="border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px">
        <div style="font-size:11.5px;color:var(--mute);margin-bottom:4px">Ticket #${t.id} · ${data_br(t.criado)}</div>
        ${thread}${rodape}</div>`;
    }).join("");
}
async function enviarRespostaTicket(id, texto){
  try {
    const r = await fetch("/api/tickets/responder",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ticket_id:id,mensagem:texto})});
    const j = await r.json().catch(()=>({}));
    if (!r.ok){ alert(j.erro || "Não foi possível enviar."); return; }
    loadTickets();
  } catch { alert("Erro de conexão."); }
}
document.addEventListener("click", e=>{
  if (!e.target.classList || !e.target.classList.contains("tk-reply-send")) return;
  const id = e.target.dataset.t;
  const inp = document.querySelector(`.tk-reply[data-t="${id}"]`);
  const txt = (inp && inp.value.trim()) || "";
  if (txt.length < 2){ return; }
  enviarRespostaTicket(parseInt(id), txt);
});

$("#tk-send").onclick = async ()=>{
  const msg = $("#tk-msg").value.trim();
  const out = $("#tk-out");
  if (msg.length < 5){ out.style.color="#ff6b6b"; out.textContent="Escreva sua mensagem (mín. 5 caracteres)."; return; }
  $("#tk-send").disabled = true; out.style.color="var(--dim)"; out.textContent="Enviando...";
  try {
    const r = await fetch("/api/tickets",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mensagem:msg})});
    const j = await r.json().catch(()=>({}));
    if (r.ok){ out.style.color="var(--green)"; out.textContent="✓ Ticket enviado! Responderemos em breve."; $("#tk-msg").value=""; loadTickets(); }
    else { out.style.color="#ff6b6b"; out.textContent = j.erro || "Não foi possível enviar."; }
  } catch { out.style.color="#ff6b6b"; out.textContent="Erro de conexão."; }
  $("#tk-send").disabled = false;
};

$("#sair").onclick = async e => { e.preventDefault(); await fetch("/api/logout",{method:"POST"}); location.href="/login"; };
load();
loadTickets();
</script>
</body>
</html>
